name: NEO Guard proof surface

on:
  push:
    paths:
      - "docs/neo-guard/**"
      - ".github/workflows/neo-guard-tests.yml"
  pull_request:
    paths:
      - "docs/neo-guard/**"
      - ".github/workflows/neo-guard-tests.yml"

jobs:
  neo-guard-tests:
    name: Run NEO Guard v0.1 tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        working-directory: docs/neo-guard
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        working-directory: docs/neo-guard
        run: pytest

      - name: Run end-to-end demo
        working-directory: docs/neo-guard
        run: python run_end_to_end_demo.py
